# Tests skipped because they're flaky on CI or have a known
# regression on `main`. Each entry MUST link to a tracking
# issue so we know who owns the resolution and when to remove
# the entry.
#
# Fields:
#   id      — pytest nodeid, e.g. `tests/foo/test_bar.py::test_x`.
#   reason  — one-line description shown in pytest output.
#   issue   — tracking issue number.
#   cluster — similarity bucket / suspected shared root cause.
#             This is intentionally independent of `issue`: a large
#             umbrella issue can contain multiple clusters, and `issue: 0`
#             means a tracking issue still needs to be filed for that bucket.
#   mode    — `skip` (default) or `xfail`.
#             - skip:  test does not run.
#             - xfail: test runs; failure reports as XFAIL (silent),
#                      a passing test reports XPASS so we can
#                      drop the entry. Use for tests we expect to
#                      get fixed (real regressions). Use `skip`
#                      for tests that are flaky-but-unowned.
#
# To add: append a `- id: ... reason: ... issue: ...` block.
# To remove: delete the block. (`pytest_collection_modifyitems`
# emits a warning at session start for any entry whose `id`
# doesn't match a collected test, so stale entries surface.)
#
# Note: entries here apply to every pytest invocation. If you
# want to debug a skipped test locally, comment out its block.
skips:
