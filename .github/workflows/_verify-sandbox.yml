# TEMPORARY verification workflow — DELETE before merging PR #1269.
#
# Proves the doc-drafter's hardened sandbox works on the real CI backend
# (linux_bwrap), which local macOS testing (darwin_seatbelt) cannot. Two things
# it confirms:
#   1. The drafter's sandbox resolves to linux_bwrap with allow_network:false —
#      NOT a silent `none` fallback (which would happen if bubblewrap is absent,
#      silently disabling the hardening).
#   2. The drafter runs end-to-end under bwrap on a real PR diff and still writes
#      MDX — i.e. the os_env helper interpreter launches (the exact regression
#      that broke under seatbelt locally: `execvp ... Operation not permitted`).
#
# Triggered on push to the feature branch so it runs without needing the
# workflow on the default branch. Same-repo branch → secrets are available.
name: _verify doc-sync sandbox (TEMP — delete before merge)

on:
  push:
    branches: [doc-changelog-and-update]

permissions:
  contents: read

concurrency:
  group: verify-sandbox
  cancel-in-progress: true

env:
  OMNIGENT_SKIP_WEB_UI: "true"
  UV_INDEX_URL: https://pypi.org/simple
  PIP_INDEX_URL: https://pypi.org/simple

jobs:
  verify:
    if: github.repository == 'omnigent-ai/omnigent'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check LLM credentials
        id: creds
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -z "${LLM_API_KEY:-}" ]; then
            echo "::error::No LLM credentials — cannot verify the drafter under bwrap."
            exit 1
          fi
          echo "::add-mask::${LLM_API_KEY}"

      - name: Check out omnigent (this branch)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Check out omnigent-site (docs)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: omnigent-ai/omnigent-site
          path: omnigent-site
          token: ${{ github.token }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Cache virtualenv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('.python-version') }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync --extra all --extra dev

      - name: Install Claude Code CLI
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/.cc-cli" && cd "${GITHUB_WORKSPACE}/.cc-cli"
          npm install --ignore-scripts --no-audit --no-fund @anthropic-ai/claude-code@2.1.170
          node node_modules/@anthropic-ai/claude-code/install.cjs
          echo "${GITHUB_WORKSPACE}/.cc-cli/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Write Omnigent provider config
        env:
          GATEWAY_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
        run: |
          mkdir -p "$HOME/.omnigent"
          python3 -c "
          import pathlib, os, json
          gw = os.environ['GATEWAY_BASE_URL']
          cfg = {'providers': {'databricks-gateway': {
              'kind': 'gateway', 'default': ['anthropic'],
              'anthropic': {
                  'base_url': gw + '/anthropic',
                  'api_key_ref': 'env:LLM_API_KEY',
                  'models': {'default': 'databricks-claude-opus-4-8'},
              }}}}
          pathlib.Path.home().joinpath('.omnigent', 'config.yaml').write_text(json.dumps(cfg, indent=2))
          "

      # --- Sanity: confirm the drafter is unsandboxed (Polly's posture) ---
      - name: Show drafter sandbox posture
        run: |
          set -euo pipefail
          uv run --no-sync python - <<'PY'
          from pathlib import Path
          from omnigent.spec import load
          sb = load(Path(".github/agents/doc-drafter")).os_env.sandbox
          print(f"drafter sandbox.type = {sb.type}  (expected: none, matching examples/polly)")
          PY

      # --- Drafter end-to-end on Linux with the FILE-based diff (the argv fix) ---
      # PR #881's diff is ~162 KB — larger than Linux's ~128 KiB single-argv limit,
      # which is exactly what broke when the diff was passed inline via -p. This
      # proves the file-based hand-off works and the drafter writes MDX on Linux.
      - name: Build drafter prompt from PR #881 diff (file-based)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/omnigent-ai/omnigent/pulls/881" \
            -H "Accept: application/vnd.github.v3.diff" | head -c 524288 > /tmp/pr_diff.txt || true
          echo "diff bytes: $(wc -c < /tmp/pr_diff.txt)"
          gh pr view 881 --repo omnigent-ai/omnigent --json title,body > /tmp/pr_meta.json
          python3 -u <<'PYEOF'
          import json, os, pathlib, shutil
          ws = os.environ["GITHUB_WORKSPACE"]
          meta = json.loads(pathlib.Path("/tmp/pr_meta.json").read_text())
          body = (meta.get("body") or "")[:4000]
          shutil.copyfile("/tmp/pr_diff.txt", pathlib.Path(ws) / "_pr_diff.txt")
          prompt = f"""SITE_REPO={ws}/omnigent-site
          PR_NUMBER=881
          PR_TITLE={meta['title']}
          DIFF_FILE=./_pr_diff.txt

          Read DIFF_FILE first — it holds the merged PR's full diff and is your
          source of truth. Then draft the omnigent-site docs update per your
          instructions and print the DOC_DRAFT_SUMMARY block.

          ## Description
          {body if body else '(no description)'}
          """
          pathlib.Path("/tmp/draft_prompt.txt").write_text(prompt)
          print(f"prompt built: {len(prompt)} chars (diff handed off via file)")
          PYEOF

      - name: Run drafter
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          set -euo pipefail
          prompt="$(cat /tmp/draft_prompt.txt)"
          uv run --project "${GITHUB_WORKSPACE}" omnigent run \
            "${GITHUB_WORKSPACE}/.github/agents/doc-drafter" \
            -p "$prompt" --no-session \
            2>draft-stderr.log | tee /tmp/draft_out.txt \
            || { echo "::warning::drafter exited non-zero"; cat draft-stderr.log; }

      - name: Assert the drafter wrote MDX
        working-directory: omnigent-site
        run: |
          set -euo pipefail
          echo "=== omnigent-site working-tree changes ==="
          git --no-pager diff --stat
          if grep -qiE "Argument list too long|execvp|os_env helper failed" /tmp/draft_out.txt ../draft-stderr.log 2>/dev/null; then
            echo "::error::Found a launch/argv failure in drafter output — the drafter did not run."
            exit 1
          fi
          if [ -z "$(git status --porcelain)" ]; then
            echo "::error::Drafter produced NO file changes — it ran but wrote nothing."
            exit 1
          fi
          echo "OK: drafter ran on Linux with the file-based diff and wrote MDX."

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: verify-sandbox-${{ github.run_id }}
          path: |
            /tmp/draft_out.txt
            draft-stderr.log
          retention-days: 7
          if-no-files-found: ignore
